# Cineloom remote generation server — standalone, isolated, non-intrusive.
#
# Safe-by-design for a shared GPU host:
#   * unique container name + image + host port (8879) — no clash with other stacks
#   * pinned to a single GPU via NVIDIA_VISIBLE_DEVICES (set CINELOOM_GPU)
#   * model dir mounted read-only; nothing outside ./ + the model dir is touched
#
# Configure ./.env first (see .env.example): CINELOOM_GPU, CINELOOM_MODEL_DIR, …
#
# Bring up:   docker compose -f server/docker-compose.yml up -d --build
# Logs:       docker compose -f server/docker-compose.yml logs -f
# Tear down:  docker compose -f server/docker-compose.yml down

services:
  cineloom-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: cineloom/server:latest
    container_name: cineloom-server
    restart: unless-stopped
    ports:
      - "8879:8879"
    environment:
      # Pin to a single GPU so it never touches the others on a shared host.
      - NVIDIA_VISIBLE_DEVICES=${CINELOOM_GPU:-0}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CINELOOM_API_KEY=${CINELOOM_API_KEY:-}
      - CINELOOM_MODEL_DIR=/model
      - CINELOOM_WORK_DIR=/work
      - CINELOOM_MAX_FRAMES=${CINELOOM_MAX_FRAMES:-161}
      # Offload mode: "sequential" (~6-8 GB, neighbour-friendly) | "model" (~10-15 GB, faster)
      - CINELOOM_OFFLOAD=${CINELOOM_OFFLOAD:-sequential}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    runtime: nvidia
    volumes:
      # Mount your downloaded LTX-2.3 model (read-only). Set CINELOOM_MODEL_DIR in .env.
      - ${CINELOOM_MODEL_DIR:-./models/ltx23-distilled-int8}:/model:ro
      - ./_work:/work
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8879/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 40s
